<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
  />
  <title>小手机</title>
  <style>
    :root {
      --bg: #ffffff;
      --top: #f3f3f3;
      --line: #ececec;
      --text: #111111;
      --sub: #adb3bd;
      --cover: #a8a8a8;
      --tab-h: 48px; 
      --chatbar-h: 54px; 
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      background: #fff;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      background: #fff;
    }

    .screen.active {
      display: block;
    }

    .top-screen {
      padding-bottom: 60px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    /* 顶栏调整 */
    .header {
      position: sticky;
      top: 0;
      z-index: 8;
      height: calc(54px + var(--safe-top)); 
      padding-top: var(--safe-top);
      background: var(--top);
      border-bottom: 1px solid var(--line);
    }

    .header-bar {
      height: 54px;
      display: grid;
      grid-template-columns: 50px 1fr 50px;
      align-items: center;
    }

    .header-title {
      text-align: center;
      font-size: 17px; 
      font-weight: 600; 
      letter-spacing: 0.2px;
    }

    .header-btn,
    .icon-text-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: #111;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .back-char {
      font-size: 36px;
      line-height: 1;
      transform: translateY(-1px);
      font-weight: 300;
    }

    .plus-icon {
      transition: transform 0.45s cubic-bezier(0.25, 1, 0.3, 1);
      transform-origin: center center; 
    }

    .header-btn.open .plus-icon {
      transform: rotate(180deg);
    }

    .friend-list {
      background: #fff;
    }

    .friend-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      text-align: left;
      cursor: pointer;
    }

    .friend-avatar {
      width: 58px;
      height: 58px;
      border-radius: 30px; 
      background: linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .friend-avatar::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ededed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
    }

    .friend-avatar::after {
      content: "";
      position: absolute;
      width: 42px;
      height: 22px;
      border-radius: 22px 22px 0 0;
      background: #efefef;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
    }

    .friend-main {
      min-width: 0;
      flex: 1;
    }

    /* 新增：好友名称和时间的同行布局 */
    .friend-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .friend-name {
      font-size: 16px; 
      font-weight: 600;
      color: #111;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* 新增：时间样式 */
    .friend-time {
      font-size: 12px;
      color: #b2b2b2;
      font-weight: 400;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .friend-sub {
      font-size: 13px;
      color: #9ea5b0;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-list {
      padding: 90px 24px 0;
      text-align: center;
      color: #bcc2cb;
      font-size: 15px;
    }

    /* 朋友圈页 */
    .moments-cover {
      position: relative;
      height: calc(290px + var(--safe-top));
      padding-top: var(--safe-top);
      background: #b2b2b2;
    }

    .moments-cam {
      position: absolute;
      top: calc(16px + var(--safe-top));
      right: 16px;
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    .moments-profile {
      position: absolute;
      right: 16px;
      bottom: -22px;
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    .moments-name {
      color: #fff;
      font-size: 19px;
      font-weight: 700;
      padding-bottom: 24px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    .moments-avatar {
      width: 68px;
      height: 68px;
      border-radius: 12px;
      background: #333;
      border: 2px solid #fff;
    }

    .moments-body {
      min-height: calc(100dvh - 290px - var(--tab-h) - var(--safe-bottom));
      padding-top: 110px;
      text-align: center;
      color: #b7bcc5;
      font-size: 15px;
      background: #fff;
    }

    /* 我 - 页面重构 */
    .me-profile {
      padding: calc(64px + var(--safe-top)) 24px 20px;
      background: #fff;
    }

    .me-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #333;
      margin-bottom: 16px;
    }

    .me-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .me-name {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      line-height: 1.1;
    }

    .status-pill {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #ededed;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #666;
      font-size: 12px;
      background: #fff;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #37d05f;
    }

    .handle {
      font-size: 15px;
      color: #adb1b8;
    }

    .menu {
      list-style: none;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    .menu li {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 16px;
      color: #111;
      border-bottom: 1px solid #f5f5f5;
    }

    /* 底栏调整 */
    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      height: 60px; /* 固定整体小高度 */
      padding-bottom: 10px; /* 仅给下方留一点点自然缝隙，消灭巨型白条 */
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #fff;
      border-top: 1px solid var(--line);
    }

    .tabbar.hidden {
      display: none;
    }

    .tab-item {
      appearance: none;
      border: 0;
      background: transparent;
      color: #7e8390;
      font-size: 13px; 
      font-weight: 400; 
      cursor: pointer;
    }

    .tab-item.active {
      color: #111;
      font-weight: 600; 
    }

    /* 侧边竖半屏（抽屉菜单）样式 */
    .drawer-mask {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .drawer-mask.show {
      opacity: 1;
      visibility: visible;
    }

    .side-drawer {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 75vw;
      max-width: 340px;
      background: var(--bg);
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,0.08);
      overflow-y: auto;
    }

    .drawer-mask.show .side-drawer {
      transform: translateX(0);
    }

    .drawer-header {
      padding: calc(30px + var(--safe-top)) 24px 24px;
      background: var(--top);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .drawer-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0e0e0, #c4c4c4);
      margin-bottom: 16px;
      position: relative;
    }
    
    .drawer-avatar::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .drawer-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .drawer-desc {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 16px;
    }

    .drawer-stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .drawer-list {
      padding: 12px 0;
      flex: 1;
    }

    .drawer-item {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .drawer-item:active {
      background: #f7f7f7;
    }

    .drawer-item-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--top);
      display: grid;
      place-items: center;
      margin-right: 16px;
      color: #444;
      flex-shrink: 0;
    }

    .drawer-item-text {
      flex: 1;
      min-width: 0;
    }

    .dit-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .dit-sub {
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 弹窗调整 */
    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.34);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-mask.show {
      display: flex;
    }

    .modal {
      width: min(620px, calc(100vw - 48px));
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.18);
      padding: 26px 26px 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 15px; 
      font-weight: 600;
      margin-bottom: 8px; 
      color: #222;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid #d0d5dd; 
      border-radius: 999px;
      outline: none;
      background: #fff;
      color: #111;
      padding: 0 16px;
      font-size: 15px;
    }

    .input {
      height: 48px; 
    }

    .textarea {
      border-radius: 24px;
      min-height: 120px;
      resize: none;
      padding: 14px 16px;
      line-height: 1.5;
    }

    .input::placeholder,
    .textarea::placeholder {
      color: #b8bec9;
    }

    .modal-error {
      min-height: 20px;
      margin: -6px 0 8px;
      font-size: 13px;
      color: #df3b3b;
    }

    .modal-actions {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }

    .btn {
      appearance: none;
      border: 0;
      height: 48px; 
      border-radius: 999px;
      font-size: 15px; 
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }

    .btn-light {
      background: #fff;
      color: #111;
      border: 1px solid #d8dde6;
      max-width: 160px;
    }

    .btn-dark {
      background: #000;
      color: #fff;
      flex: 1.6;
    }

    /* 聊天页 */
    .chat-screen {
      background: #fff;
    }

    .chat-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      height: calc(54px + var(--safe-top));
      padding-top: var(--safe-top);
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .chat-header-bar {
      height: 54px;
      display: grid;
      grid-template-columns: 50px 1fr 50px;
      align-items: center;
    }

    .chat-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
    }

    .chat-body {
      position: absolute;
      top: calc(54px + var(--safe-top));
      left: 0;
      right: 0;
      bottom: 68px; /* 配合底栏稍微抬高的尺寸，防止最后一条消息被挡住 */
      overflow-y: auto;
      overscroll-behavior: contain;
      background: #fff;
      padding: 16px 14px 20px;
    }
    
    /* 保留：专门去掉设置页面的底部空白 */
    #screen-settings .chat-body {
      bottom: 0;
      padding-bottom: 20px;
    }

    /* 专门去掉设置页面的底部空白 */
    #screen-settings .chat-body {
      bottom: 0;
      padding-bottom: calc(20px + var(--safe-bottom));
    }

    .chat-empty {
      height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 40px;
      color: #c5ccd6;
      font-size: 15px;
      text-align: center;
    }

    .messages {
      display: flex;
      flex-direction: column;
      /* 去掉 gap，改用 margin-bottom 控制间距，方便实现紧凑的气泡组 */
    }

    .message-row {
      display: flex;
      width: 100%;
      gap: 14px; 
      align-items: flex-start;
      margin-bottom: 16px; /* 不同组或单条消息的默认大间距 */
    }

    /* 同一组内的连续消息间距缩小，紧凑排列 */
    .message-row.first, .message-row.middle {
      margin-bottom: 2px;
    }

    .message-row.ai {
      flex-direction: row;
      justify-content: flex-start;
      padding-right: 15vw; 
    }

    .message-row.me {
      flex-direction: row-reverse;
      justify-content: flex-start;
      padding-left: 15vw; 
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%);
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
    }

    /* 隐藏右侧（用户自己）的头像 */
    .message-row.me .chat-avatar {
      display: none;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      max-width: 100%;
    }
    
    .message-row.ai .message-content {
      align-items: flex-start;
    }
    
    .message-row.me .message-content {
      align-items: flex-end;
    }

    .bubble {
      padding: 8px 14px; 
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* ====== AI (左侧) 气泡圆角组逻辑 ====== */
    /* 单条独立消息：全大圆角 */
    .message-row.ai.single .bubble {
      background: #F2F4F8;
      color: #111;
      border-radius: 22px; 
    }
    /* 连发组 第一条：左下角变直角 */
    .message-row.ai.first .bubble {
      background: #F2F4F8;
      color: #111;
      border-radius: 22px 22px 22px 4px;
    }
    /* 连发组 中间：左上、左下皆变直角 */
    .message-row.ai.middle .bubble {
      background: #F2F4F8;
      color: #111;
      border-radius: 4px 22px 22px 4px;
    }
    /* 连发组 最后一条：左上变直角，左下恢复圆角尾巴 */
    .message-row.ai.last .bubble {
      background: #F2F4F8;
      color: #111;
      border-radius: 4px 22px 22px 22px;
    }

    /* ====== 我 (右侧) 气泡圆角组逻辑 ====== */
    /* 单条独立消息：全大圆角 */
    .message-row.me.single .bubble {
      background: #111111;
      color: #fff;
      border-radius: 22px; 
    }
    /* 连发组 第一条：右下角变直角 */
    .message-row.me.first .bubble {
      background: #111111;
      color: #fff;
      border-radius: 22px 22px 4px 22px;
    }
    /* 连发组 中间：右上、右下皆变直角 */
    .message-row.me.middle .bubble {
      background: #111111;
      color: #fff;
      border-radius: 22px 4px 4px 22px;
    }
    /* 连发组 最后一条：右上变直角，右下恢复圆角尾巴 */
    .message-row.me.last .bubble {
      background: #111111;
      color: #fff;
      border-radius: 22px 4px 22px 22px;
    }

    .message-time {
      font-size: 11px;
      color: #b2b2b2;
      margin-top: 6px;
      margin-left: 4px;
      margin-right: 4px;
    }

    .chatbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      height: 68px; /* 高度微微增加，专门用来做底部留白 */
      padding: 8px 12px 18px; /* 上边距保持紧凑，下边距加大到18px，底部自然留出一小截安全缝隙 */
      background: #fff;
      border-top: 1px solid #f0f0f0;
    }

    .chatbar-inner {
      height: 100%;
      display: flex;
      align-items: center;
    }

    .chatbar-inner > #chatExtraBtn {
      /* 原本的 margin-right 删除，由 input-wrap 统一控制间距 */
    }

    .chatbar-inner > #voiceBtn {
      margin-right: -2px;
      transform: translate(10px, 1.5px);
      /* 精确控制：向右移动 5px，向上移动 3px */
    }

    /* 专门缩小回复键内部的图标 (原本是 26px，缩小 5px 变为 21px) */
    .chatbar-inner > #voiceBtn img {
      width: 18px;
      height: 18px;
    }

    .icon-img-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    /* 其他按钮的默认图标大小保持不变 */
    .icon-img-btn img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
    }

    .chat-input-wrap {
      flex: 1;
      /* 占据剩余全部空间，实现输入框向右拉伸 */
      margin: 0 -6px; /* 间距加大到18px，对齐画线区域 */
      position: relative;
      height: 33px;
      border-radius: 999px;
      background: #f7f7f8;
      overflow: hidden;
    }

    /* 新增：物品栏弹窗样式 */
    .inventory-popup {
      position: absolute;
      bottom: 76px; /* 位于底部聊天栏上方 */
      left: 12px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      padding: 6px 0;
      display: none;
      flex-direction: column;
      z-index: 50;
      width: 110px;
    }

    .inventory-popup.show {
      display: flex;
    }

    .inventory-item {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #111;
      text-align: center;
      cursor: pointer;
    }

    .inventory-item:active {
      background: #f5f5f5;
    }

    .chat-input {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      background: transparent;
      padding: 0 0px 0 15px;
      font-size: 16px; /* 关键修改：字体必须大于等于16px，手机端才不会自动放大导致页面乱飞 */
      color: #111;
    }

    .chat-input::placeholder {
      color: #b8bfca;
    }

    .inner-icon {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
    }

    .hidden {
      display: none !important;
    }

    /* 字体预览气泡样式 */
    .preview-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      max-width: 85%;
      position: relative;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .preview-left {

<body>
  <div class="app">
    <section class="screen top-screen active" id="screen-friends">

              <line x1="12" y1="5" x2="12" y2="19"></line>

          <div class="moments-name">{{user}}</div>
          <div class="moments-avatar"></div>
        </div>
      </div>

    <section class="screen top-screen" id="screen-me">

      <ul class="menu">
        <li>钱包</li>
        <li>个人资料</li>
        <li id="openSettingsBtn" style="cursor: pointer;">设置</li>
      </ul>
    </section>

    <section class="screen chat-screen" id="screen-settings">
      <div class="chat-header" style="border-bottom: none; background: #f2f2f7;">
        <div class="chat-header-bar">
          <button class="header-btn" id="settingsBackBtn" aria-label="返回">
            <span class="back-char">‹</span>
          </button>
          <div class="chat-title" style="font-size: 17px; font-weight: 600;">设置</div>
          <button class="header-btn" id="saveSettingsBtn" style="font-size: 15px; font-weight: 600; color: #111; width: auto; padding-right: 16px;">保存</button>
        </div>
      </div>
      <div class="chat-body" style="padding: 20px 16px; background: #f2f2f7;">
        
        <div style="font-size: 13px; color: #8e8e93; margin: 0 0 8px 12px;">API 设置</div>
        <div style="background: #fff; border-radius: 16px; padding: 4px 16px; margin-bottom: 24px;">
          <div class="field" style="margin: 12px 0; border-bottom: 1px solid #f2f2f7; padding-bottom: 16px;">
            <label for="apiUrlInput" style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px;">反代地址 (API URL)</label>
            <input class="input" id="apiUrlInput" type="text" placeholder="例如: https://api.openai.com/v1" style="background: #f7f7f8; border: none; height: 44px; border-radius: 12px;" />
          </div>
          <div class="field" style="margin: 12px 0;">
            <label for="apiKeyInput" style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px;">密钥 (API Key)</label>
            <input class="input" id="apiKeyInput" type="password" placeholder="sk-..." style="background: #f7f7f8; border: none; height: 44px; border-radius: 12px;" />
          </div>
        </div>

        <div style="font-size: 13px; color: #8e8e93; margin: 0 0 8px 12px;">模型设置</div>
        <div style="background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 24px;">
          <div class="field" style="display: flex; margin-bottom: 16px;">
            <button class="btn" id="fetchModelsBtn" style="flex: 1; background: #111; color: #fff; font-size: 15px; font-weight: 600; height: 44px; border-radius: 12px;">拉取可用模型</button>

          <div class="field" style="margin-bottom: 20px; border-bottom: 1px solid #f2f2f7; padding-bottom: 16px;">
            <label for="modelSelect" style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px;">选择模型</label>
            <select class="input" id="modelSelect" style="appearance: auto; background: #f7f7f8; border: none; height: 44px; border-radius: 12px; padding-right: 12px; width: 100%; color: #111;">

          <div class="field" style="margin-bottom: 4px;">

        <div style="font-size: 13px; color: #8e8e93; margin: 0 0 8px 12px;">个性化 (全局字体与排版)</div>

          <div class="field" style="display: flex; gap: 8px; margin-bottom: 16px; align-items: center;">

            <button class="btn btn-light" id="saveFontPresetBtn" style="height: 36px; padding: 0 12px; font-size: 13px; border-radius: 8px; flex: none; max-width: none;">保存预设</button>

          <div class="field" style="margin-bottom: 16px; border-bottom: 1px solid #f2f2f7; padding-bottom: 16px;">
            <label style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px;">全局字体</label>
            <input class="input" id="fontUrlInput" type="text" placeholder="填写字体链接 (如 https://.../font.ttf)" style="background: #f7f7f8; border: none; height: 44px; border-radius: 12px; margin-bottom: 8px;" />
            <div style="display: flex; align-items: center; gap: 12px;">
              <button class="btn btn-light" style="flex: 1; height: 36px; font-size: 14px; position: relative; border-radius: 8px;">
                选择本地字体文件
                <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" style="position: absolute; inset: 0; opacity: 0; cursor: pointer;" />
              </button>
              <button class="btn btn-light" id="clearFontBtn" style="height: 36px; padding: 0 12px; font-size: 14px; border-radius: 8px; flex: none;">清除</button>

          </div>

          <div class="field" style="margin-bottom: 20px;">
            <label style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 12px;">对话预览 (点击切换中英文)</label>
            <div id="fontPreviewArea" style="background: #f2f2f7; padding: 16px; border-radius: 12px; cursor: pointer; user-select: none;">

                <div class="preview-bubble preview-left" id="previewTextLeft">怎么会没有话题呢</div>
                <div style="font-size: 11px; color: #a1a1a1; margin-top: 4px; margin-left: 4px;">21:50</div>
              </div>
              <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <div class="preview-bubble preview-right" id="previewTextRight">每天的云都不一样呀</div>
                <div style="font-size: 11px; color: #a1a1a1; margin-top: 4px; margin-right: 4px;">21:53 已读</div>
              </div>
            </div>
          </div>

          <div class="field" style="margin-bottom: 4px;">
            <label for="fontSizeInput" style="display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #222; margin-bottom: 12px;">
              <span>气泡文本大小</span>
              <span id="fontSizeDisplay" style="color: #8e8e93; font-weight: normal;">15px</span>
            </label>
            <input type="range" id="fontSizeInput" min="12" max="25" step="1" value="15" style="width: 100%; accent-color: #d1d1d6; height: 4px; outline: none; margin: 4px 0 8px 0;" />
          </div>

        </div>

      </div>
    </section>

    <section class="screen chat-screen" id="screen-chat">
      <div class="chat-header">
        <div class="chat-header-bar">
          <button class="header-btn" id="chatBackBtn" aria-label="返回">
            <span class="back-char">‹</span>

              <circle cx="12" cy="5" r="1"></circle>
              <circle cx="12" cy="12" r="1"></circle>

      <div class="chat-body" id="chatBody">

      <div class="inventory-popup" id="inventoryPopup">

        <div class="inventory-item">相册</div>

        <div class="inventory-item">转账</div>
        <div class="inventory-item">语音</div>
        <div class="inventory-item">语音通话</div>

          </button>

          <button class="icon-img-btn" id="sendBtn" aria-label="发送">
            <img src="https://i.postimg.cc/JnMYDd8b/IMG-4835.png" alt="" />

        </div>
      </div>
    </section>

    <section class="screen chat-screen" id="screen-chat-details">
      <div class="chat-header" style="border-bottom: none; background: #f2f2f7;">
        <div class="chat-header-bar">
          <button class="header-btn" id="detailsBackBtn" aria-label="返回">
            <span class="back-char">‹</span>
          </button>
          <div class="chat-title" style="font-size: 17px; font-weight: 600;">聊天详情</div>
          <button class="header-btn" id="saveDetailsBtn" style="font-size: 15px; font-weight: 600; color: #111; width: auto; padding-right: 16px;">保存</button>
        </div>
      </div>
      <div class="chat-body" style="padding: 20px 16px; background: #f2f2f7; bottom: 0;">
        
        <div style="background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 24px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid #f2f2f7; padding-bottom: 16px;">

              <button class="btn btn-light" id="changeAvatarBtn" style="height: 36px; padding: 0 16px; font-size: 14px; border-radius: 8px;">更改</button>

          <div class="field" style="display: flex; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #f2f2f7; padding-bottom: 16px;">

      </div>
    </section>

      <div class="side-drawer" id="frameBottomSheet" style="width: 100%; max-width: none; height: 65vh; top: auto; bottom: 0; transform: translateY(100%); border-radius: 24px 24px 0 0; background: #fff; display: flex; flex-direction: column;">

              <input type="range" id="frameScaleSlider" min="0.8" max="2.5" step="0.01" value="1" style="flex: 1; accent-color: #111;" />
              <span style="font-size: 12px; color: #999;">2.5</span>
            </div>
          </div>

          <div style="width: 100%; margin-bottom: 16px;">
            <label style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px; display: flex; justify-content: space-between;">
              <span>横向平移 (左右)</span>
              <span id="frameXVal" style="color: #666; font-weight: normal;">0</span>

              <span style="font-size: 12px; color: #999;">-50</span>

              <span style="font-size: 12px; color: #999;">+50</span>
            </div>
          </div>

          <div style="width: 100%; margin-bottom: 24px;">
            <label style="font-size: 14px; font-weight: 600; color: #222; margin-bottom: 8px; display: flex; justify-content: space-between;">
              <span>纵向平移 (上下)</span>
              <span id="frameYVal" style="color: #666; font-weight: normal;">0</span>

              <span style="font-size: 12px; color: #999;">-50</span>

            id="personaInput"
            placeholder="输入TA的人物设定，TA会严格遵守"
          ></textarea>
        </div>

        <div class="modal-error" id="modalError"></div>

        <div class="modal-actions">
          <button class="btn btn-light" id="cancelModalBtn">取消</button>
          <button class="btn btn-dark" id="saveRoleBtn">保存联系人</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 辅助函数：获取当前时间格式 (例如 "PM 09:04")
    function getCurrentTime() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      h = h ? h : 12; // 0点转为12点
      const hStr = String(h).padStart(2, '0');
      return `${ampm} ${hStr}:${m}`;
    }

    const state = {
      userAvatar: "",
      apiSettings: {
        url: "",
        key: "",
        model: "",
        temperature: 1.0
      },
      fontSettings: {
        currentPresetId: "default",
        url: "",
        size: 15
      },
      fontPresets: [
        { id: "default", name: "默认预设", url: "", size: 15 }
      ],
      currentTab: "friends",
      activeContactId: null,
      uploadedFrames: [], // 全局保存用户上传过的头像框历史
      contacts: [
        {
          id: makeId(),
          remark: "哥",
          realName: "",
          persona: "你是一个简洁、自然、好相处的 AI 好友，说话不用太长。",
          myPersona: "",
          avatar: "",
          frameUrl: "",
          frameScale: 1,
          frameX: 0,
          frameY: 0,
          lastTime: "22:36",
          messages: []
        },
        {
          id: makeId(),
          remark: "()",
          realName: "",
          persona: "你是一个简洁、自然、好相处的 AI 好友，说话不用太长。",
          myPersona: "",
          avatar: "",
          frameUrl: "",
          frameScale: 1,
          frameX: 0,
          frameY: 0,
          lastTime: "昨天",
          messages: []
        }
      ]
    };

    const screens = {
      friends: document.getElementById("screen-friends"),
      moments: document.getElementById("screen-moments"),
      me: document.getElementById("screen-me"),
      chat: document.getElementById("screen-chat"),
      settings: document.getElementById("screen-settings")
    };

    const tabbar = document.getElementById("tabbar");
    const tabs = document.querySelectorAll(".tab-item");
    const friendList = document.getElementById("friendList");
    const emptyList = document.getElementById("emptyList");

    const addRoleBtn = document.getElementById("addRoleBtn");
    const modalMask = document.getElementById("modalMask");
    const cancelModalBtn = document.getElementById("cancelModalBtn");
    const saveRoleBtn = document.getElementById("saveRoleBtn");
    const remarkInput = document.getElementById("remarkInput");
    const realNameInput = document.getElementById("realNameInput");
    const personaInput = document.getElementById("personaInput");
    const modalError = document.getElementById("modalError");

    const chatBackBtn = document.getElementById("chatBackBtn");
    const chatTitle = document.getElementById("chatTitle");
    const chatBody = document.getElementById("chatBody");
    const chatEmpty = document.getElementById("chatEmpty");
    const messagesEl = document.getElementById("messages");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");

    const menuBtn = document.getElementById("menuBtn");
    const drawerMask = document.getElementById("drawerMask");

    function makeId() {
      return "id_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    }

    function getDisplayName(contact) {
      return contact.remark?.trim() || contact.realName?.trim() || "未命名角色";
    }

    function getContact(id) {
      return state.contacts.find(item => item.id === id);
    }

    function switchTab(tab) {
      state.currentTab = tab;

      screens.friends.classList.toggle("active", tab === "friends");
      screens.moments.classList.toggle("active", tab === "moments");
      screens.me.classList.toggle("active", tab === "me");
      screens.chat.classList.remove("active");

      tabbar.classList.remove("hidden");

      tabs.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
    }

    function renderContacts() {
      friendList.innerHTML = "";

      if (!state.contacts.length) {
        emptyList.classList.remove("hidden");
        return;
      }

      emptyList.classList.add("hidden");

      state.contacts.forEach(contact => {
        const item = document.createElement("button");
        item.className = "friend-item";
        item.dataset.id = contact.id;

        const avatar = document.createElement("div");
        avatar.className = "friend-avatar";
        if (contact.avatar) {
          avatar.style.backgroundImage = `url(${contact.avatar})`;
          avatar.style.backgroundSize = "cover";
          avatar.style.backgroundPosition = "center";
          avatar.classList.add("has-custom-avatar");
        } else {
          avatar.style.background = "linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%)";
          avatar.classList.remove("has-custom-avatar");
        }

        if (contact.frameUrl) {
          const frameImg = document.createElement("img");
          frameImg.src = contact.frameUrl;
          frameImg.style.position = "absolute";
          frameImg.style.pointerEvents = "none";
          frameImg.style.objectFit = "contain";
          frameImg.style.left = `calc(50% + ${contact.frameX || 0}px)`;
          frameImg.style.top = `calc(50% + ${contact.frameY || 0}px)`;
          frameImg.style.transform = "translate(-50%, -50%)";
          frameImg.style.width = `${100 * (contact.frameScale || 1)}%`;
          frameImg.style.height = `${100 * (contact.frameScale || 1)}%`;
          avatar.appendChild(frameImg);
        }

        const main = document.createElement("div");
        main.className = "friend-main";

        // 构建同行显示的名字和时间
        const titleRow = document.createElement("div");
        titleRow.className = "friend-title-row";

        const name = document.createElement("div");
        name.className = "friend-name";
        name.textContent = getDisplayName(contact);

        const time = document.createElement("div");
        time.className = "friend-time";
        time.textContent = contact.lastTime || ""; // 显示最后时间

        titleRow.appendChild(name);
        titleRow.appendChild(time);

        const sub = document.createElement("div");
        sub.className = "friend-sub";
        sub.textContent = contact.messages.length
          ? contact.messages[contact.messages.length - 1].text
          : "[系统消息：开始与 AI 好友聊天吧]";

        main.appendChild(titleRow);
        main.appendChild(sub);
        
        item.appendChild(avatar);
        item.appendChild(main);

        item.addEventListener("click", () => openChat(contact.id));
        friendList.appendChild(item);
      });
    }

    function openAddModal() {
      modalMask.classList.add("show");
      addRoleBtn.classList.add("open");
      modalError.textContent = "";
      setTimeout(() => remarkInput.focus(), 20);
    }

    function closeAddModal() {
      modalMask.classList.remove("show");
      addRoleBtn.classList.remove("open");
      modalError.textContent = "";
    }

    function clearModalForm() {
      remarkInput.value = "";
      realNameInput.value = "";
      personaInput.value = "";
    }

    function saveRole() {
      const remark = remarkInput.value.trim();
      const realName = realNameInput.value.trim();
      const persona = personaInput.value.trim();

      if (!remark && !realName) {
        modalError.textContent = "至少填写备注或真名";
        return;
      }

      const newContact = {
        id: makeId(),
        remark,
        realName,
        persona,
        myPersona: "",
        avatar: "",
        frameUrl: "",
        frameScale: 1,
        frameX: 0,
        frameY: 0,
        lastTime: getCurrentTime(), // 新联系人默认当前时间
        messages: []
      };
      state.contacts.unshift(newContact);
      renderContacts();
      closeAddModal();
      clearModalForm();
    }

    function openChat(contactId) {
      state.activeContactId = contactId;

      screens.friends.classList.remove("active");
      screens.moments.classList.remove("active");
      screens.me.classList.remove("active");
      screens.chat.classList.add("active");
      tabbar.classList.add("hidden");

      renderChat();
      setTimeout(() => chatInput.focus(), 30);
    }

    function backToFriends() {
      screens.chat.classList.remove("active");
      switchTab("friends");
    }

    function renderChat() {
      const contact = getContact(state.activeContactId);
      if (!contact) return;

      chatTitle.textContent = getDisplayName(contact);
      messagesEl.innerHTML = "";

      if (!contact.messages.length) {
        chatEmpty.classList.remove("hidden");
        messagesEl.classList.add("hidden");
        return;
      }

      chatEmpty.classList.add("hidden");
      messagesEl.classList.remove("hidden");

      contact.messages.forEach((msg, index) => {
        const prevMsg = contact.messages[index - 1];
        const nextMsg = contact.messages[index + 1];

        // 判断是否为同一组：发送者相同，且时间相同（同一分钟内视为连续，隔段时间自动断开成单独气泡）
        const isSamePrev = prevMsg && prevMsg.from === msg.from && prevMsg.time === msg.time;
        const isSameNext = nextMsg && nextMsg.from === msg.from && msg.time === nextMsg.time;

        // 分配气泡的组内位置类名
        let positionClass = "single";
        if (!isSamePrev && isSameNext) positionClass = "first";
        else if (isSamePrev && isSameNext) positionClass = "middle";
        else if (isSamePrev && !isSameNext) positionClass = "last";

        const row = document.createElement("div");
        // 动态加上位置类名 (single / first / middle / last)
        row.className = `message-row ${msg.from === "me" ? "me" : "ai"} ${positionClass}`;

        const avatar = document.createElement("div");
        avatar.className = "chat-avatar";
        
        // 分组连发时：只在第一条/单条显示头像，后续连发的头像变透明（以此完美对齐气泡）
        if (positionClass === "middle" || positionClass === "last") {
          avatar.style.visibility = "hidden";
        } else {
          avatar.style.position = "relative"; // 保证头像框可以基于头像定位
          if (msg.from === "me") {
            if (state.userAvatar) avatar.style.backgroundImage = `url(${state.userAvatar})`;
            else avatar.style.background = "#333";
          } else {
            if (contact.avatar) {
              avatar.style.backgroundImage = `url(${contact.avatar})`;
            } else {
              avatar.style.background = "linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%)";
            }
            
            // 叠加头像框
            if (contact.frameUrl) {
              const frameImg = document.createElement("img");
              frameImg.src = contact.frameUrl;
              frameImg.style.position = "absolute";
              frameImg.style.pointerEvents = "none";
              frameImg.style.objectFit = "contain";
              frameImg.style.left = `calc(50% + ${contact.frameX || 0}px)`;
              frameImg.style.top = `calc(50% + ${contact.frameY || 0}px)`;
              frameImg.style.transform = "translate(-50%, -50%)";
              frameImg.style.width = `${100 * (contact.frameScale || 1)}%`;
              frameImg.style.height = `${100 * (contact.frameScale || 1)}%`;
              avatar.appendChild(frameImg);
            }
          }
        }

        const contentWrap = document.createElement("div");
        contentWrap.className = "message-content";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = msg.text;

        contentWrap.appendChild(bubble);

        // 时间戳只在 单独一条 或 连发组的最后一条 消息下方显示
        if (positionClass === "single" || positionClass === "last") {
          const time = document.createElement("div");
          time.className = "message-time";
          time.textContent = msg.time || getCurrentTime();
          contentWrap.appendChild(time);
        }

        row.appendChild(avatar);
        row.appendChild(contentWrap);
        
        messagesEl.appendChild(row);
      });

      requestAnimationFrame(() => {
        chatBody.scrollTop = chatBody.scrollHeight;
      });

      renderContacts();
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      const contact = getContact(state.activeContactId);
      if (!contact || !text) return;

      contact.messages.push({
        from: "me",
        text,
        time: getCurrentTime()
      });
      contact.lastTime = getCurrentTime(); // 更新最后发送时间

      chatInput.value = "";
      renderChat();
    }

    async function triggerAIReply() {
      const contact = getContact(state.activeContactId);
      if (!contact) return;

      const api = state.apiSettings;
      
      // 检查 API 配置是否填写
      if (!api.url || !api.key) {
        contact.messages.push({
          from: "ai",
          text: "请先前往设置填写api哦",
          time: getCurrentTime()
        });
        contact.lastTime = getCurrentTime();
        if (state.activeContactId === contact.id) renderChat();
        else renderContacts();
        return;
      }

      // 组装 OpenAI 格式的消息体
      const messages = [];
      let combinedPersona = "";
      if (contact.persona) {
        combinedPersona += `你的设定：${contact.persona}\n`;
      }
      if (contact.myPersona) {
        combinedPersona += `与你对话的用户的设定：${contact.myPersona}\n`;
      }
      if (combinedPersona) {
        messages.push({ role: "system", content: combinedPersona });
      }
      
      // 提取历史消息 (为了防止 token 超限，这里提取最近的 30 条)
      const history = contact.messages.slice(-30);
      history.forEach(msg => {
        messages.push({
          role: msg.from === "me" ? "user" : "assistant",
          content: msg.text
        });
      });

      // 插入一条 "正在输入..." 的临时气泡提升体验
      const loadingMsgIndex = contact.messages.length;
      contact.messages.push({
        from: "ai",
        text: "正在思考...",
        time: getCurrentTime()
      });
      renderChat();

      try {
        const endpoint = api.url.endsWith('/') ? api.url + 'chat/completions' : api.url + '/chat/completions';
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${api.key}`
          },
          body: JSON.stringify({
            model: api.model || "gpt-3.5-turbo",
            messages: messages,
            temperature: api.temperature
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP 状态码异常: ${response.status}`);
        }

        const data = await response.json();
        const aiText = data.choices[0].message.content;

        // 请求成功，把刚才的 "正在思考..." 替换为真实的 AI 回复
        contact.messages[loadingMsgIndex].text = aiText;
        contact.messages[loadingMsgIndex].time = getCurrentTime();
        contact.lastTime = getCurrentTime();
        
      } catch (error) {
        // 请求失败时的提示
        contact.messages[loadingMsgIndex].text = "[请求失败: 请检查网络、API地址和密钥是否正确 (" + error.message + ")]";
        contact.messages[loadingMsgIndex].time = getCurrentTime();
        contact.lastTime = getCurrentTime();
      }

      // 最后刷新视图
      if (state.activeContactId === contact.id) renderChat();
      else renderContacts();
    }

    tabs.forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    addRoleBtn.addEventListener("click", openAddModal);
    cancelModalBtn.addEventListener("click", closeAddModal);
    saveRoleBtn.addEventListener("click", saveRole);

    modalMask.addEventListener("click", (e) => {
      if (e.target === modalMask) closeAddModal();
    });

    chatBackBtn.addEventListener("click", backToFriends);

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

        const inventoryPopup = document.getElementById("inventoryPopup");
    
    // 点击物品栏图标，显示或隐藏弹窗
    document.getElementById("chatExtraBtn").addEventListener("click", (e) => {
      e.stopPropagation(); // 阻止点击事件传给页面，导致立刻触发关闭逻辑
      inventoryPopup.classList.toggle("show");
    });

    // 点击页面其他任意地方，收起弹窗
    document.addEventListener("click", (e) => {
      if (!inventoryPopup.contains(e.target) && e.target !== document.getElementById("chatExtraBtn")) {
        inventoryPopup.classList.remove("show");
      }
    });

    // 点击弹窗里的各个选项后，自动收起弹窗
    document.querySelectorAll(".inventory-item").forEach(item => {
      item.addEventListener("click", () => {
        inventoryPopup.classList.remove("show");
        // 你后续如果要给比如“相机”、“转账”加功能，可以写在这里
      });
    });
    document.getElementById("emojiBtn").addEventListener("click", () => {
      chatInput.value += "🙂";
      chatInput.focus();
    });

        document.getElementById("voiceBtn").addEventListener("click", () => {
      triggerAIReply();
    });

    menuBtn.addEventListener("click", () => {
      drawerMask.classList.add("show");
    });
    
    drawerMask.addEventListener("click", (e) => {
      if (e.target === drawerMask) {
        drawerMask.classList.remove("show");
      }
    });

    // ================== 个性化设置 & 动态样式注入 ==================
    function applyGlobalFontAndSize() {
      let styleEl = document.getElementById("dynamic-font-style");
      if (!styleEl) {
        styleEl = document.createElement("style");
        styleEl.id = "dynamic-font-style";
        document.head.appendChild(styleEl);
      }
      const fontUrl = state.fontSettings.url;
      const fontSize = state.fontSettings.size;
      let css = "";
      if (fontUrl) {
        css += `@font-face { font-family: 'AppCustomFont'; src: url('${fontUrl}'); }\n`;
        css += `body, input, textarea, button, select { font-family: 'AppCustomFont', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif !important; }\n`;
      } else {
        css += `body, input, textarea, button, select { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif !important; }\n`;
      }
      css += `.bubble, .preview-bubble { font-size: ${fontSize}px !important; }\n`;
      styleEl.innerHTML = css;
    }

    // ================== 设置页面逻辑 ==================
    const openSettingsBtn = document.getElementById("openSettingsBtn");
    const settingsBackBtn = document.getElementById("settingsBackBtn");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    
    // API 元素
    const apiUrlInput = document.getElementById("apiUrlInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const fetchModelsBtn = document.getElementById("fetchModelsBtn");
    const modelSelect = document.getElementById("modelSelect");
    const tempInput = document.getElementById("tempInput");
    const tempValueDisplay = document.getElementById("tempValueDisplay");

    // 个性化 元素
    const fontPresetSelect = document.getElementById("fontPresetSelect");
    const saveFontPresetBtn = document.getElementById("saveFontPresetBtn");
    const deleteFontPresetBtn = document.getElementById("deleteFontPresetBtn");
    const fontUrlInput = document.getElementById("fontUrlInput");
    const fontFileInput = document.getElementById("fontFileInput");
    const clearFontBtn = document.getElementById("clearFontBtn");
    const fontSizeInput = document.getElementById("fontSizeInput");
    const fontSizeDisplay = document.getElementById("fontSizeDisplay");
    const fontPreviewArea = document.getElementById("fontPreviewArea");
    const previewTextLeft = document.getElementById("previewTextLeft");
    const previewTextRight = document.getElementById("previewTextRight");

    // 预设刷新函数
    function renderFontPresets() {
      fontPresetSelect.innerHTML = "";
      state.fontPresets.forEach(preset => {
        const opt = document.createElement("option");
        opt.value = preset.id;
        opt.textContent = preset.name;
        fontPresetSelect.appendChild(opt);
      });
      fontPresetSelect.value = state.fontSettings.currentPresetId;
    }

    openSettingsBtn.addEventListener("click", () => {
      // 载入 API 设置
      apiUrlInput.value = state.apiSettings.url;
      apiKeyInput.value = state.apiSettings.key;
      tempInput.value = state.apiSettings.temperature;
      tempValueDisplay.textContent = state.apiSettings.temperature;
      if (state.apiSettings.model && modelSelect.options.length <= 1) {
        modelSelect.innerHTML = `<option value="${state.apiSettings.model}">${state.apiSettings.model}</option>`;
      }
      
      // 载入个性化设置
      renderFontPresets();
      fontUrlInput.value = state.fontSettings.url;
      fontSizeInput.value = state.fontSettings.size;
      fontSizeDisplay.textContent = state.fontSettings.size + "px";

      screens.me.classList.remove("active");
      screens.settings.classList.add("active");
      tabbar.classList.add("hidden");
    });

    settingsBackBtn.addEventListener("click", () => {
      screens.settings.classList.remove("active");
      screens.me.classList.add("active");
      tabbar.classList.remove("hidden");
    });

    tempInput.addEventListener("input", (e) => {
      tempValueDisplay.textContent = Number(e.target.value).toFixed(1);
    });

    // 模型拉取
    fetchModelsBtn.addEventListener("click", async () => {
      const url = apiUrlInput.value.trim();
      const key = apiKeyInput.value.trim();
      if (!url || !key) {
        alert("请先填写反代地址和密钥");
        return;
      }
      fetchModelsBtn.textContent = "拉取中...";
      try {
        const endpoint = url.endsWith('/') ? url + 'models' : url + '/models';
        const res = await fetch(endpoint, {
          headers: { "Authorization": `Bearer ${key}` }
        });
        if (!res.ok) throw new Error("网络请求失败");
        const data = await res.json();
        if (data.data && data.data.length > 0) {
          modelSelect.innerHTML = data.data.map(m => `<option value="${m.id}">${m.id}</option>`).join("");
          alert("模型拉取成功！");
        } else {
          alert("未获取到模型列表，请检查接口返回格式");
        }
      } catch (err) {
        alert("拉取模型失败，请检查地址和密钥是否正确。\n" + err.message);
      } finally {
        fetchModelsBtn.textContent = "拉取可用模型";
      }
    });

    // =============== 个性化交互逻辑 ===============

    // 选择预设
    fontPresetSelect.addEventListener("change", (e) => {
      const selectedId = e.target.value;
      const preset = state.fontPresets.find(p => p.id === selectedId);
      if (preset) {
        state.fontSettings.currentPresetId = selectedId;
        state.fontSettings.url = preset.url;
        state.fontSettings.size = preset.size;
        fontUrlInput.value = preset.url;
        fontSizeInput.value = preset.size;
        fontSizeDisplay.textContent = preset.size + "px";
        applyGlobalFontAndSize();
      }
    });

    // 保存预设
    saveFontPresetBtn.addEventListener("click", () => {
      const name = prompt("请输入预设名称：", "自定义预设");
      if (!name) return;
      const newPreset = {
        id: "preset_" + Date.now(),
        name: name,
        url: state.fontSettings.url,
        size: state.fontSettings.size
      };
      state.fontPresets.push(newPreset);
      state.fontSettings.currentPresetId = newPreset.id;
      renderFontPresets();
      alert("预设已保存！");
    });

    // 删除预设
    deleteFontPresetBtn.addEventListener("click", () => {
      if (state.fontSettings.currentPresetId === "default") {
        alert("默认预设不可删除");
        return;
      }
      if (confirm("确定要删除当前预设吗？")) {
        state.fontPresets = state.fontPresets.filter(p => p.id !== state.fontSettings.currentPresetId);
        state.fontSettings.currentPresetId = "default";
        // 回退到 default
        const def = state.fontPresets.find(p => p.id === "default");
        state.fontSettings.url = def.url;
        state.fontSettings.size = def.size;
        renderFontPresets();
        fontUrlInput.value = def.url;
        fontSizeInput.value = def.size;
        fontSizeDisplay.textContent = def.size + "px";
        applyGlobalFontAndSize();
      }
    });

    // 字体链接输入
    fontUrlInput.addEventListener("input", (e) => {
      state.fontSettings.url = e.target.value.trim();
      applyGlobalFontAndSize();
    });

    // 选择本地字体文件
    fontFileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const fileUrl = URL.createObjectURL(file);
        state.fontSettings.url = fileUrl;
        fontUrlInput.value = fileUrl;
        applyGlobalFontAndSize();
      }
    });

    // 清除字体
    clearFontBtn.addEventListener("click", () => {
      state.fontSettings.url = "";
      fontUrlInput.value = "";
      fontFileInput.value = "";
      applyGlobalFontAndSize();
    });

    // 大小滑块
    fontSizeInput.addEventListener("input", (e) => {
      const size = e.target.value;
      state.fontSettings.size = size;
      fontSizeDisplay.textContent = size + "px";
      applyGlobalFontAndSize();
    });

    // 点击预览区域切换中英文
    let isPreviewZh = true;
    fontPreviewArea.addEventListener("click", () => {
      isPreviewZh = !isPreviewZh;
      if (isPreviewZh) {
        previewTextLeft.textContent = "怎么会没有话题呢";
        previewTextRight.textContent = "每天的云都不一样呀";
      } else {
        previewTextLeft.textContent = "How could we have no topics?";
        previewTextRight.textContent = "The clouds are different every day!";
      }
    });

    // 总体保存
    saveSettingsBtn.addEventListener("click", () => {
      state.apiSettings.url = apiUrlInput.value.trim();
      state.apiSettings.key = apiKeyInput.value.trim();
      state.apiSettings.model = modelSelect.value;
      state.apiSettings.temperature = parseFloat(tempInput.value);
      alert("设置已保存");
      
      screens.settings.classList.remove("active");
      screens.me.classList.add("active");
      tabbar.classList.remove("hidden");
    });
    // ================== 头像同步与更换逻辑 ==================
    const meAvatar = document.querySelector(".me-avatar");
    const momentsAvatar = document.querySelector(".moments-avatar");
    const drawerAvatar = document.querySelector(".drawer-avatar");
    
    function updateUserAvatar(url) {
      state.userAvatar = url;
      const bgVal = `url(${url})`;
      
      meAvatar.style.backgroundImage = bgVal;
      meAvatar.style.backgroundSize = "cover";
      meAvatar.style.backgroundPosition = "center";
      
      momentsAvatar.style.backgroundImage = bgVal;
      momentsAvatar.style.backgroundSize = "cover";
      momentsAvatar.style.backgroundPosition = "center";
      
      drawerAvatar.style.backgroundImage = bgVal;
      drawerAvatar.style.backgroundSize = "cover";
      drawerAvatar.style.backgroundPosition = "center";

      // 如果在聊天界面，重新渲染以更新右侧气泡的头像
      if (screens.chat.classList.contains("active")) {
        renderChat();
      }
    }

    // 创建一个隐藏的 input file 用于上传头像
    const avatarInput = document.createElement("input");
    avatarInput.type = "file";
    avatarInput.accept = "image/*";
    avatarInput.style.display = "none";
    document.body.appendChild(avatarInput);

    avatarInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const fileUrl = URL.createObjectURL(file);
        updateUserAvatar(fileUrl);
      }
    });

    // 点击“我”界面头像更换
    meAvatar.addEventListener("click", () => {
      avatarInput.click();
    });
    // 点击“朋友圈”界面头像更换
    momentsAvatar.addEventListener("click", () => {
      avatarInput.click();
    });

    // ================== 聊天详情 & 头像框交互逻辑 ==================
    const chatDetailsBtn = document.getElementById("chatDetailsBtn");
    const screenChatDetails = document.getElementById("screen-chat-details");
    const detailsBackBtn = document.getElementById("detailsBackBtn");
    const saveDetailsBtn = document.getElementById("saveDetailsBtn");

    const detailsAvatarPreview = document.getElementById("detailsAvatarPreview");
    const detailsFrameOverlay = document.getElementById("detailsFrameOverlay");
    const changeAvatarBtn = document.getElementById("changeAvatarBtn");
    const contactAvatarInput = document.getElementById("contactAvatarInput");
    
    const detailsRemarkInput = document.getElementById("detailsRemarkInput");
    const detailsRealNameInput = document.getElementById("detailsRealNameInput");
    const detailsPersonaInput = document.getElementById("detailsPersonaInput");
    const detailsMyPersonaInput = document.getElementById("detailsMyPersonaInput");

    const openFrameModalBtn = document.getElementById("openFrameModalBtn");
    const frameModalMask = document.getElementById("frameModalMask");
    const frameBottomSheet = document.getElementById("frameBottomSheet");
    const saveFrameBtn = document.getElementById("saveFrameBtn");
    const framePreviewContainer = document.getElementById("framePreviewContainer");
    const framePreviewOverlay = document.getElementById("framePreviewOverlay");
    const uploadFrameBtn = document.getElementById("uploadFrameBtn");
    const frameFileInput = document.getElementById("frameFileInput");
    const frameScaleSlider = document.getElementById("frameScaleSlider");
    const frameXSlider = document.getElementById("frameXSlider");
    const frameYSlider = document.getElementById("frameYSlider");
    const frameHistoryGrid = document.getElementById("frameHistoryGrid");

    let tempFrameUrl = "";
    let tempFrameScale = 1;
    let tempFrameX = 0;
    let tempFrameY = 0;

    // 1. 打开聊天详情
    chatDetailsBtn.addEventListener("click", () => {
      const contact = getContact(state.activeContactId);
      if (!contact) return;

      // 回显数据
      detailsRemarkInput.value = contact.remark || "";
      detailsRealNameInput.value = contact.realName || "";
      detailsPersonaInput.value = contact.persona || "";
      detailsMyPersonaInput.value = contact.myPersona || "";
      
      if (contact.avatar) {
        detailsAvatarPreview.style.backgroundImage = `url(${contact.avatar})`;
      } else {
        detailsAvatarPreview.style.backgroundImage = "linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%)";
      }

      if (contact.frameUrl) {
        detailsFrameOverlay.src = contact.frameUrl;
        detailsFrameOverlay.style.display = "block";
        detailsFrameOverlay.style.width = `${100 * (contact.frameScale || 1)}%`;
        detailsFrameOverlay.style.height = `${100 * (contact.frameScale || 1)}%`;
        detailsFrameOverlay.style.left = `calc(50% + ${contact.frameX || 0}px)`;
        detailsFrameOverlay.style.top = `calc(50% + ${contact.frameY || 0}px)`;
        detailsFrameOverlay.style.transform = "translate(-50%, -50%)";
      } else {
        detailsFrameOverlay.style.display = "none";
      }

      screens.chat.classList.remove("active");
      screenChatDetails.classList.add("active");
    });

    // 2. 退出详情（不保存）
    detailsBackBtn.addEventListener("click", () => {
      screenChatDetails.classList.remove("active");
      screens.chat.classList.add("active");
    });

    // 3. 更换头像（仅预览，点右上角保存才生效）
    changeAvatarBtn.addEventListener("click", () => {
      contactAvatarInput.click();
    });
    contactAvatarInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const fileUrl = URL.createObjectURL(file);
        detailsAvatarPreview.style.backgroundImage = `url(${fileUrl})`;
        detailsAvatarPreview.dataset.tempAvatar = fileUrl; // 暂存
      }
    });

    // 4. 保存详情
    saveDetailsBtn.addEventListener("click", () => {
      const contact = getContact(state.activeContactId);
      if (!contact) return;

      contact.remark = detailsRemarkInput.value.trim();
      contact.realName = detailsRealNameInput.value.trim();
      contact.persona = detailsPersonaInput.value.trim();
      contact.myPersona = detailsMyPersonaInput.value.trim();

      if (detailsAvatarPreview.dataset.tempAvatar) {
        contact.avatar = detailsAvatarPreview.dataset.tempAvatar;
        delete detailsAvatarPreview.dataset.tempAvatar;
      }

      screenChatDetails.classList.remove("active");
      screens.chat.classList.add("active");
      chatTitle.textContent = getDisplayName(contact);
      renderChat();
      renderContacts();
    });

// 5. 打开头像框弹窗
    openFrameModalBtn.addEventListener("click", () => {
      const contact = getContact(state.activeContactId);
      if (!contact) return;

      // 弹窗里的头像底图
      const currentTempAvatar = detailsAvatarPreview.dataset.tempAvatar || contact.avatar;
      if (currentTempAvatar) {
        framePreviewContainer.style.backgroundImage = `url(${currentTempAvatar})`;
      } else {
        framePreviewContainer.style.backgroundImage = "linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%)";
      }

      tempFrameUrl = contact.frameUrl || "";
      tempFrameScale = contact.frameScale || 1;
      tempFrameX = contact.frameX || 0;
      tempFrameY = contact.frameY || 0;
      
      frameScaleSlider.value = tempFrameScale;
      frameXSlider.value = tempFrameX;
      frameYSlider.value = tempFrameY;

      // 更新标签数值
      document.getElementById("frameScaleVal").textContent = tempFrameScale.toFixed(2);
      document.getElementById("frameXVal").textContent = tempFrameX > 0 ? "+" + tempFrameX : tempFrameX;
      document.getElementById("frameYVal").textContent = tempFrameY > 0 ? "+" + tempFrameY : tempFrameY;
      
      updateFramePreview();
      renderFrameHistory();

      frameModalMask.classList.add("show");
      setTimeout(() => { frameBottomSheet.style.transform = "translateY(0)"; }, 10);
    });

    // 6. 关闭头像框弹窗
    frameModalMask.addEventListener("click", (e) => {
      if (e.target === frameModalMask) closeFrameModal();
    });
    function closeFrameModal() {
      frameBottomSheet.style.transform = "translateY(100%)";
      setTimeout(() => { frameModalMask.classList.remove("show"); }, 300);
    }

    // 7. 更新拉条
    function handleSliderChange() {
      tempFrameScale = parseFloat(frameScaleSlider.value);
      tempFrameX = parseInt(frameXSlider.value, 10);
      tempFrameY = parseInt(frameYSlider.value, 10);
      
      document.getElementById("frameScaleVal").textContent = tempFrameScale.toFixed(2);
      document.getElementById("frameXVal").textContent = tempFrameX > 0 ? "+" + tempFrameX : tempFrameX;
      document.getElementById("frameYVal").textContent = tempFrameY > 0 ? "+" + tempFrameY : tempFrameY;

      updateFramePreview();
    }
    
    frameScaleSlider.addEventListener("input", handleSliderChange);
    frameXSlider.addEventListener("input", handleSliderChange);
    frameYSlider.addEventListener("input", handleSliderChange);

    function updateFramePreview() {
      if (tempFrameUrl) {
        framePreviewOverlay.src = tempFrameUrl;
        framePreviewOverlay.style.display = "block";
        framePreviewOverlay.style.width = `${100 * tempFrameScale}%`;
        framePreviewOverlay.style.height = `${100 * tempFrameScale}%`;
        framePreviewOverlay.style.left = `calc(50% + ${tempFrameX}px)`;
        framePreviewOverlay.style.top = `calc(50% + ${tempFrameY}px)`;
      } else {
        framePreviewOverlay.style.display = "none";
      }
    }

    // 8. 上传新头像框
    uploadFrameBtn.addEventListener("click", () => {
      frameFileInput.click();
    });
    frameFileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const fileUrl = URL.createObjectURL(file);
        tempFrameUrl = fileUrl;
        tempFrameScale = 1;
        tempFrameX = 0;
        tempFrameY = 0;
        
        frameScaleSlider.value = tempFrameScale;
        frameXSlider.value = tempFrameX;
        frameYSlider.value = tempFrameY;

        document.getElementById("frameScaleVal").textContent = "1.00";
        document.getElementById("frameXVal").textContent = "0";
        document.getElementById("frameYVal").textContent = "0";
        
        if (!state.uploadedFrames.includes(fileUrl)) {
          state.uploadedFrames.unshift(fileUrl);
        }
        
        updateFramePreview();
        renderFrameHistory();
      }
    });

    // 9. 渲染历史记录列表 (一排四个)
    function renderFrameHistory() {
      frameHistoryGrid.innerHTML = "";
      const noneItem = document.createElement("div");
      noneItem.style.width = "100%"; noneItem.style.aspectRatio = "1/1";
      noneItem.style.borderRadius = "8px"; noneItem.style.border = "1px solid #ddd";
      noneItem.style.display = "flex"; noneItem.style.alignItems = "center";
      noneItem.style.justifyContent = "center"; noneItem.style.fontSize = "13px";
      noneItem.style.color = "#666"; noneItem.style.cursor = "pointer";
      noneItem.textContent = "无";
      noneItem.onclick = () => { tempFrameUrl = ""; updateFramePreview(); renderFrameHistory(); };
      if (!tempFrameUrl) { noneItem.style.borderColor = "#111"; noneItem.style.borderWidth = "2px"; }
      frameHistoryGrid.appendChild(noneItem);

      state.uploadedFrames.forEach(url => {
        const imgItem = document.createElement("img");
        imgItem.src = url;
        imgItem.style.width = "100%"; imgItem.style.aspectRatio = "1/1";
        imgItem.style.objectFit = "contain"; imgItem.style.borderRadius = "8px";
        imgItem.style.border = "1px solid #ddd"; imgItem.style.cursor = "pointer";
        if (url === tempFrameUrl) { imgItem.style.borderColor = "#111"; imgItem.style.borderWidth = "2px"; }
        imgItem.onclick = () => {
          tempFrameUrl = url;
          updateFramePreview();
          renderFrameHistory();
        };
        frameHistoryGrid.appendChild(imgItem);
      });
    }

    // 10. 确认并保存头像框
    saveFrameBtn.addEventListener("click", () => {
      const contact = getContact(state.activeContactId);
      if (contact) {
        contact.frameUrl = tempFrameUrl;
        contact.frameScale = tempFrameScale;
        contact.frameX = tempFrameX;
        contact.frameY = tempFrameY;
        
        // 马上更新背后详情界面的预览
        if (contact.frameUrl) {
          detailsFrameOverlay.src = contact.frameUrl;
          detailsFrameOverlay.style.display = "block";
          detailsFrameOverlay.style.width = `${100 * contact.frameScale}%`;
          detailsFrameOverlay.style.height = `${100 * contact.frameScale}%`;
          detailsFrameOverlay.style.left = `calc(50% + ${contact.frameX}px)`;
          detailsFrameOverlay.style.top = `calc(50% + ${contact.frameY}px)`;
          detailsFrameOverlay.style.transform = "translate(-50%, -50%)";
        } else {
          detailsFrameOverlay.style.display = "none";
        }
      }
      closeFrameModal();
    });

    // 初始化运行一次动态样式
    applyGlobalFontAndSize();
    renderContacts();
    switchTab("friends");
  </script>
</body>
</html>
