<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小手机</title>
  <style>
    :root {
      --bg: #d3d3d3;
      --page: #ffffff;
      --top: #f3f3f3;
      --line: #efefef;
      --text: #111111;
      --sub: #a8acb3;
      --muted: #bfbfbf;
      --cover: #ababab;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background: var(--bg);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone {
      position: relative;
      width: min(100vw, 390px);
      height: 100dvh;
      max-height: 844px;
      background: var(--page);
      overflow: hidden;
      border-radius: 28px 28px 24px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .page {
      position: absolute;
      inset: 0 0 76px 0;
      background: #fff;
      display: none;
    }

    .page.active {
      display: block;
    }

    .window-pill {
      position: absolute;
      top: 44px;
      left: 18px;
      z-index: 20;
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.red { background: #f56e63; }
    .dot.yellow { background: #f3c94b; }
    .dot.green { background: #79c96a; }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      background: #fff;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      z-index: 15;
    }

    .tab-item {
      border: 0;
      background: transparent;
      color: #7f8490;
      font-size: 18px;
      font-weight: 600;
    }

    .tab-item.active {
      color: #111;
    }

    .home-arc {
      position: absolute;
      right: 12px;
      bottom: 8px;
      width: 42px;
      height: 26px;
      border-right: 6px solid #111;
      border-bottom: 6px solid #111;
      border-bottom-right-radius: 28px;
      z-index: 16;
      pointer-events: none;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%) translateY(8px);
      background: rgba(20, 20, 20, 0.82);
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 30;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 通用顶部 */
    .top-strip {
      height: 108px;
      background: var(--top);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.03);
    }

    /* 好友页 */
    .friends-header {
      position: relative;
      height: 108px;
      background: var(--top);
    }

    .friends-title {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }

    .plus-btn {
      position: absolute;
      top: 34px;
      right: 18px;
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      font-size: 34px;
      color: #111;
      line-height: 1;
      cursor: pointer;
    }

    .friend-list {
      background: #fff;
    }

    .friend-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .avatar-default {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(180deg, #d7d7d7 0%, #c9c9c9 100%);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .avatar-default::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f0f0f0;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
    }

    .avatar-default::after {
      content: "";
      position: absolute;
      width: 44px;
      height: 24px;
      border-radius: 24px 24px 0 0;
      background: #efefef;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
    }

    .friend-name {
      font-size: 20px;
      color: #111;
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .friend-sub {
      font-size: 14px;
      color: #b9bcc2;
    }

    /* 朋友圈页 */
    .moments-cover {
      position: relative;
      height: 300px;
      background: var(--cover);
    }

    .moments-setting {
      position: absolute;
      top: 50px;
      right: 20px;
      width: 30px;
      height: 30px;
      border: 2px dashed rgba(0,0,0,0.25);
      border-radius: 50%;
      color: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: transparent;
      cursor: pointer;
    }

    .moments-profile {
      position: absolute;
      right: 14px;
      bottom: -30px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .moments-name {
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
      padding-bottom: 16px;
    }

    .avatar-cute {
      width: 78px;
      height: 78px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fff8dc 100%);
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
      display: grid;
      place-items: center;
      font-size: 34px;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .moments-body {
      height: calc(100% - 300px);
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 110px;
      color: #b7b7b7;
      font-size: 18px;
    }

    /* 我 页 */
    .me-profile {
      padding: 18px 22px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .me-avatar {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fff8dc 100%);
      display: grid;
      place-items: center;
      font-size: 42px;
      margin-bottom: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .me-name {
      font-size: 26px;
      font-weight: 800;
      color: #222;
      line-height: 1.1;
    }

    .status-pill {
      height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #ededed;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #666;
      font-size: 16px;
      background: #fff;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #37d05f;
    }

    .handle {
      font-size: 18px;
      color: #adb1b8;
    }

    .menu {
      list-style: none;
      margin: 0;
      padding: 0;
      background: #fff;
    }

    .menu li {
      height: 88px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      font-size: 22px;
      color: #111;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .menu li:last-child {
      border-bottom: none;
    }

    /* 小屏兼容 */
    @media (max-width: 390px) {
      .phone {
        width: 100vw;
        height: 100dvh;
        max-height: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="window-pill">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>

    <!-- 好友 -->
    <section class="page active" id="page-friends">
      <div class="friends-header">
        <div class="friends-title">好友</div>
        <button class="plus-btn" id="addFriendBtn">+</button>
      </div>

      <div class="friend-list">
        <div class="friend-item" id="friendCard">
          <div class="avatar-default"></div>
          <div>
            <div class="friend-name" id="friendName">()</div>
            <div class="friend-sub">暂无聊天记录</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 朋友圈 -->
    <section class="page" id="page-moments">
      <div class="moments-cover">
        <button class="moments-setting" id="momentsBtn">◎</button>
        <div class="moments-profile">
          <div class="moments-name" id="momentsName">{{user}}</div>
          <div class="avatar-cute">😾</div>
        </div>
      </div>
      <div class="moments-body">暂时没有动态</div>
    </section>

    <!-- 我 -->
    <section class="page" id="page-me">
      <div class="top-strip"></div>

      <div class="me-profile">
        <div class="me-avatar">😾</div>
        <div class="name-row">
          <div class="me-name" id="meName">{{user}}</div>
          <div class="status-pill">
            <span class="status-dot"></span>
            <span>状态</span>
          </div>
        </div>
        <div class="handle" id="meHandle">@user_ai</div>
      </div>

      <ul class="menu">
        <li data-name="钱包">钱包</li>
        <li data-name="记录">记录</li>
        <li data-name="世界书">世界书</li>
        <li data-name="设置">设置</li>
      </ul>
    </section>

    <div class="tabbar">
      <button class="tab-item active" data-page="friends">好友</button>
      <button class="tab-item" data-page="moments">朋友圈</button>
      <button class="tab-item" data-page="me">我</button>
    </div>

    <div class="home-arc"></div>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    const config = {
      userName: "小克",
      userId: "@user_ai",
      friendName: "()"
    };

    const pages = {
      friends: document.getElementById("page-friends"),
      moments: document.getElementById("page-moments"),
      me: document.getElementById("page-me")
    };

    const tabs = document.querySelectorAll(".tab-item");
    const toast = document.getElementById("toast");

    // 填充数据
    document.getElementById("momentsName").textContent = config.userName;
    document.getElementById("meName").textContent = config.userName;
    document.getElementById("meHandle").textContent = config.userId;
    document.getElementById("friendName").textContent = config.friendName;

    function switchTab(name) {
      Object.keys(pages).forEach(key => {
        pages[key].classList.toggle("active", key === name);
      });

      tabs.forEach(tab => {
        tab.classList.toggle("active", tab.dataset.page === name);
      });
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.page));
    });

    document.getElementById("addFriendBtn").addEventListener("click", () => {
      showToast("这里可以接“添加好友”功能");
    });

    document.getElementById("momentsBtn").addEventListener("click", () => {
      showToast("这里可以接“朋友圈设置”");
    });

    document.getElementById("friendCard").addEventListener("click", () => {
      showToast("点击了好友卡片");
    });

    document.querySelectorAll(".menu li").forEach(item => {
      item.addEventListener("click", () => {
        showToast("打开：" + item.dataset.name);
      });
    });
  </script>
</body>
</html>
